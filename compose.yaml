# mikronetes PoC harness — a 1 control-plane + 2 worker Kubernetes cluster,
# each container capped at 512 MB RAM with NO swap, mirroring a stack of
# Raspberry Pi 3A+ / Zero 2 W boards. (The dev box has plenty of RAM; each
# *node* is still held to 512 MB, so what passes here runs on the boards.)
#
# Today this runs REAL k0s (v1.36.1) as the known-good baseline. As the
# mikronetes Rust stack lands, services here get swapped to it one at a time,
# and scripts/smoke-test.sh must stay green the whole way.
#
# The control-plane runs controller-only (no workloads); the two workers are
# the schedulable nodes, so `kubectl get nodes` shows 2 Ready workers.
#
#   scripts/cluster-up.sh    bring the cluster up (handles the join token)
#   scripts/smoke-test.sh    the PR gate: 2 worker nodes Ready + a pod serving traffic
#   scripts/cluster-down.sh  tear it all down
#
# The 512 MB cap is enforced by equal mem_limit + memswap_limit (no swap),
# exactly mirroring the Pi where swap is disabled.
name: mikronetes-poc

x-node: &node
  image: docker.io/k0sproject/k0s:v1.36.1-k0s.0
  privileged: true
  cgroup: host
  restart: "no"
  # Hard 512 MB cap, swap disabled (limit == swap limit). This is the contract.
  mem_limit: 512m
  memswap_limit: 512m
  tmpfs:
    - /run
    - /var/run

services:
  controller:
    <<: *node
    container_name: mikronetes-controller
    hostname: controller
    command: ["k0s", "controller", "--config=/etc/k0s/k0s.yaml"]
    volumes:
      - ./poc/k0s.yaml:/etc/k0s/k0s.yaml:ro
      - controller-state:/var/lib/k0s
      - bootstrap:/shared
    ports:
      - "6443:6443"

  worker1:
    <<: *node
    container_name: mikronetes-worker1
    hostname: worker1
    # Wait for the controller to drop a join token into the shared volume,
    # then join. cluster-up.sh creates that token once the API is ready.
    # The same token is reusable, so both workers consume it.
    command:
      - sh
      - -c
      - 'while [ ! -s /shared/worker.token ]; do sleep 1; done; exec k0s worker --token-file=/shared/worker.token'
    depends_on:
      - controller
    volumes:
      - worker1-state:/var/lib/k0s
      - bootstrap:/shared

  worker2:
    <<: *node
    container_name: mikronetes-worker2
    hostname: worker2
    command:
      - sh
      - -c
      - 'while [ ! -s /shared/worker.token ]; do sleep 1; done; exec k0s worker --token-file=/shared/worker.token'
    depends_on:
      - controller
    volumes:
      - worker2-state:/var/lib/k0s
      - bootstrap:/shared

volumes:
  controller-state:
  worker1-state:
  worker2-state:
  bootstrap:
