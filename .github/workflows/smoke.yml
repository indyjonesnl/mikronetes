name: smoke-test

# The PR gate, enforced in CI: bring up the 1 control-plane + 2 worker cluster
# with each node hard-capped at 512 MB (no swap) and prove it still works —
# both workers Ready, a Hello World pod serving HTTP, no OOM kills.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker / cgroup environment
        run: |
          docker version
          docker compose version
          echo "cgroup: $(stat -fc %T /sys/fs/cgroup)"

      - name: Run the 512 MB smoke test
        run: bash scripts/smoke-test.sh

      - name: Dump cluster logs on failure
        if: failure()
        run: |
          docker compose ps || true
          for c in mikronetes-controller mikronetes-worker1 mikronetes-worker2; do
            echo "::group::logs $c"
            docker logs --tail=200 "$c" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Tear down
        if: always()
        run: bash scripts/cluster-down.sh || true
